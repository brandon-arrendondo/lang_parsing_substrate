# Pre-commit hooks for lang-parsing-substrate
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (auto-fix)
        description: Format Rust code with rustfmt
        entry: bash -c 'cargo fmt --all 2>&1 && echo "Formatting complete"'
        language: system
        pass_filenames: false
        types: [rust]
        verbose: true

      - id: cargo-clippy
        name: cargo clippy (all features)
        description: Lint Rust code with Clippy - deny warnings (all targets, all 16 language features)
        entry: bash -c 'cargo clippy --all-targets --all-features -- -D warnings 2>&1'
        language: system
        pass_filenames: false
        types: [rust]
        verbose: true

      - id: cargo-test
        name: cargo test (all features + lang-c,lang-cpp subset)
        description: Run the test suite under the full feature set and the minimal C/C++ subset, matching CI
        entry: bash -c 'cargo test --all-features 2>&1 && cargo test --no-default-features --features lang-c,lang-cpp 2>&1'
        language: system
        pass_filenames: false
        types: [rust]
        verbose: true

  # knots complexity gate — prebuilt-wheel edition (language: python, pulls
  # the `knots` wheel from PyPI instead of building from source). The default
  # `knots` hook ships args [--aird-threshold=85], so no override is needed
  # here. To tighten or add metrics, set `args:` (pre-commit replaces them
  # wholesale), e.g. args: [--aird-threshold=85, --cognitive-threshold=20]
  - repo: https://github.com/brandon-arrendondo/knots-pre-commit
    rev: v1.13.1
    hooks:
      - id: knots
        types: [rust]
