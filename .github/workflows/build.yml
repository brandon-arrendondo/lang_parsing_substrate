name: Build and Test

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Security Audit
        run: |
          cargo install cargo-audit
          cargo audit
        continue-on-error: true

      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --check

      - name: Build (all features)
        run: cargo build --all-features

      - name: Build (subset — C/C++ only)
        run: cargo build --no-default-features --features lang-c,lang-cpp

      - name: Build (no features)
        run: cargo build --no-default-features

      - name: Test (all features)
        run: cargo test --all-features

      - name: Test (subset — C/C++ only)
        run: cargo test --no-default-features --features lang-c,lang-cpp

      - name: Install cargo-about
        run: cargo install cargo-about --features cli

      - name: Generate Third-Party Licenses
        run: cargo about generate about.hbs -o THIRD_PARTY_LICENSES.txt

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        run: cargo cyclonedx --format json --spec-version 1.5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lang-parsing-substrate-${{ steps.version.outputs.VERSION }}
          path: |
            THIRD_PARTY_LICENSES.txt
            lang-parsing-substrate.cdx.json
          retention-days: 30
